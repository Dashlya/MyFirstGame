<!DOCTYPE html>
<html>
<head>
  <title>Klick das Quadrat - iPad Version mit Anzeigen</title>
  <style>
    body { 
      text-align: center; 
      font-family: Arial; 
      background-color: lightblue; /* Hintergrundfarbe ändern oder Bild nutzen */
      /* Beispiel für Hintergrundbild:
      background-image: url('background.jpg'); 
      background-size: cover; 
      background-position: center; 
      */
    }
    #game { width: 400px; height: 400px; border: 2px solid black; margin: 20px auto; position: relative; }
    #box { width: 50px; height: 50px; background-color: red; position: absolute; cursor: pointer; }
    p { font-size: 18px; }
  </style>
</head>
<body>

<h1>Klick das Quadrat!</h1>

<p>Punkte: <span id="score">0</span></p>
<p id="timer">Zeit: 30</p>
<p id="highscore">Highscore: 0</p>

<div id="game">
  <div id="box"></div>
</div>

<script>
  const box = document.getElementById("box");
  const scoreDisplay = document.getElementById("score");
  const timerDisplay = document.getElementById("timer");
  const highscoreDisplay = document.getElementById("highscore");
  let score = 0;

  // Highscore aus localStorage laden
  let highscore = localStorage.getItem('highscore') || 0;
  highscoreDisplay.textContent = highscore;

  // Sound vorbereiten
  const clickSound = new Audio('click.mp3'); // hochladen in dein Repo

  // Zufällige Farbe
  function getRandomColor() {
    const letters = '0123456789ABCDEF';
    let color = '#';
    for(let i=0;i<6;i++){ color += letters[Math.floor(Math.random()*16)]; }
    return color;
  }

  // Score erhöhen + Farbe + Sound + Highscore
  function increaseScore() {
    score++;
    scoreDisplay.textContent = score;
    box.style.backgroundColor = getRandomColor();
    clickSound.play();
    moveBox();
    
    if(score > highscore){
      highscore = score;
      localStorage.setItem('highscore', highscore);
      highscoreDisplay.textContent = highscore;
    }
  }
  box.addEventListener("click", increaseScore);
  box.addEventListener("touchstart", increaseScore);

  // Box bewegen und schwieriger machen
  function moveBox() {
    const size = Math.max(20, 50 - score);
    box.style.width = size + "px";
    box.style.height = size + "px";
    const x = Math.random() * (350 - size);
    const y = Math.random() * (350 - size);
    box.style.left = x + "px";
    box.style.top = y + "px";
  }
  moveBox();

  // Zeitlimit
  let timeLeft = 30;
  const timer = setInterval(() => {
    timeLeft--;
    timerDisplay.textContent = `Zeit: ${timeLeft}`;
    if(timeLeft <= 0){
      clearInterval(timer);
      alert(`Game Over! Deine Punkte: ${score}`);
      box.remove();
    }
  }, 1000);
</script>

</body>
</html>
